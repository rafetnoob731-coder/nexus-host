<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Sign in to NEXUS HOSTING — AI-Powered Cloud Infrastructure Platform">
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/nexus.css">
  <style>
    body { background: var(--void-black); overflow-y: auto; overflow-x: hidden; font-family: 'Inter', sans-serif; }
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .auth-bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 70%); }
    .auth-bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .auth-bg-glow::before { content: ''; position: absolute; top: -40%; left: -20%; width: 80%; height: 80%; background: radial-gradient(ellipse, rgba(0,240,255,0.08) 0%, transparent 60%); }
    .auth-bg-glow::after { content: ''; position: absolute; bottom: -30%; right: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(123,97,255,0.06) 0%, transparent 50%); }
    .auth-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .auth-hologram { position: fixed; right: 5%; top: 50%; transform: translateY(-50%); z-index: 1; pointer-events: none; opacity: 0.15; display: none; }
    @media (min-width: 1200px) { .auth-hologram { display: block; } }
    .auth-container { position: relative; z-index: 2; width: 100%; max-width: 480px; padding: 1.5rem; margin: 2rem auto; }
    .auth-card { position: relative; border-radius: 24px; padding: 2.5rem 2.5rem 2rem; background: rgba(5,5,7,0.8); backdrop-filter: blur(40px) saturate(1.8); -webkit-backdrop-filter: blur(40px) saturate(1.8); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 0 80px rgba(0,240,255,0.04), 0 0 0 1px rgba(255,255,255,0.02) inset; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3), transparent); }
    .auth-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg at 50% 50%, transparent, rgba(0,240,255,0.03), transparent, rgba(123,97,255,0.03), transparent); animation: authSpin 20s linear infinite; pointer-events: none; }
    @keyframes authSpin { to { transform: rotate(360deg); } }
    .auth-card-inner { position: relative; z-index: 1; }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo-icon { width: 64px; height: 64px; margin: 0 auto 1rem; background: var(--gradient-brand); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #fff; box-shadow: 0 0 40px rgba(0,240,255,0.2); }
    .auth-logo h1 { font-size: 1.75rem; font-weight: 800; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.03em; background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-logo p { color: rgba(255,255,255,0.35); font-size: 0.75rem; margin-top: 0.35rem; letter-spacing: 0.25em; text-transform: uppercase; }
    .auth-tabs { display: flex; gap: 0.35rem; margin-bottom: 1.75rem; background: rgba(255,255,255,0.03); border-radius: 14px; padding: 0.4rem; border: 1px solid rgba(255,255,255,0.05); }
    .auth-tab { flex: 1; padding: 0.75rem; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 600; color: rgba(255,255,255,0.35); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); background: transparent; border: none; font-size: 0.85rem; letter-spacing: 0.02em; }
    .auth-tab.active { background: linear-gradient(135deg, rgba(0,240,255,0.12), rgba(123,97,255,0.06)); color: #fff; box-shadow: 0 0 20px rgba(0,240,255,0.06); }
    .auth-form { display: none; animation: authFadeIn 0.5s ease; }
    .auth-form.active { display: block; }
    @keyframes authFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: flex; align-items: center; gap: 0.35rem; color: rgba(255,255,255,0.5); font-size: 0.7rem; font-weight: 600; margin-bottom: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .form-group .input-wrap { position: relative; }
    .form-group input { width: 100%; padding: 0.85rem 1.1rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; color: var(--signal-white); font-size: 0.9rem; font-family: inherit; transition: all 0.3s ease; outline: none; box-sizing: border-box; }
    .form-group input:focus { border-color: rgba(0,240,255,0.4); box-shadow: 0 0 0 3px rgba(0,240,255,0.06), 0 0 20px rgba(0,240,255,0.04); background: rgba(255,255,255,0.06); }
    .form-group input::placeholder { color: rgba(255,255,255,0.15); }
    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .form-options label { display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.35); font-size: 0.8rem; cursor: pointer; }
    .form-options label input[type="checkbox"] { width: auto; accent-color: var(--nexus-cyan); }
    .form-options a { color: rgba(0,240,255,0.6); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
    .form-options a:hover { color: var(--nexus-cyan); }
    .btn-auth { width: 100%; padding: 0.85rem; background: var(--gradient-brand); border: none; border-radius: 10px; color: #fff; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden; letter-spacing: 0.02em; }
    .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 16px 40px rgba(0,240,255,0.2); }
    .btn-auth:active { transform: translateY(0); }
    .btn-alt { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--signal-white); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .btn-alt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
    .btn-alt svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-alt .github-icon { color: #fff; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.25rem 0; color: rgba(255,255,255,0.15); font-size: 0.7rem; letter-spacing: 0.05em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
    .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; display: none; }
    .auth-footer { text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.2); font-size: 0.75rem; }
    .auth-footer a { color: rgba(0,240,255,0.6); text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .auth-footer a:hover { color: var(--nexus-cyan); }
    .loading-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-auth.loading .btn-text { display: none; }
    .btn-auth.loading .loading-spinner { display: block; }
    .auth-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 1rem; }
    .auth-method { padding: 0.65rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
    .auth-method:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
    .auth-method svg { width: 22px; height: 22px; opacity: 0.5; margin-bottom: 0.25rem; }
    .auth-method div { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    .twofa-inputs { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; }
    .twofa-inputs input { width: 42px; height: 52px; text-align: center; font-size: 1.3rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--signal-white); outline: none; transition: all 0.3s; }
    .twofa-inputs input:focus { border-color: rgba(0,240,255,0.5); box-shadow: 0 0 20px rgba(0,240,255,0.08); }
    .twofa-label { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 0.75rem; }
  </style>
</head>

                  <input type="password" id="loginPassword" placeholder="••••••••" required>

              </div>

                <label><input type="checkbox" checked> Remember me</label>

          <div id="registerForm" class="auth-form">
            <form onsubmit="handleRegister(event)">

                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="move2FA(this, 3)">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" oninput="move2FA(this, 4)">

  <script src="config/firebase-config.js"></script>
  <script>
    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      const tabs = document.querySelectorAll('.auth-tab');
      const tabMap = { login: 0, register: 1, otp: 2 };
      if (tabs[tabMap[tab]]) tabs[tabMap[tab]].classList.add('active');
      document.getElementById(tab + 'Form').classList.add('active');
      ['loginError','registerError','otpError'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      if (loading) { btn.classList.add('loading'); btn.disabled = true; }
      else { btn.classList.remove('loading'); btn.disabled = false; }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function move2FA(input, idx) {
      if (input.value.length >= 1) {
        const next = input.parentElement.children[idx + 1];
        if (next) next.focus();
      }
    }

    function verify2FA(input) {
      if (input.value.length >= 1) {
        const code = Array.from(input.parentElement.children).map(i => i.value).join('');
        if (code.length === 6) {
          showError('otpError', '2FA verification endpoint not yet connected');
        }
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      setLoading('loginBtn', true);
      try {
        var a = window.auth || window.NEXUS_AUTH;
        await a.signInWithEmailAndPassword(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError('loginError', err.message);
      } finally { setLoading('loginBtn', false); }
    }

    async function handleRegister(e) {
      e.preventDefault();
      setLoading('registerBtn', true);
      try {
        var a = window.auth || window.NEXUS_AUTH;
        var d = window.db || window.NEXUS_DB;
        const cred = await a.createUserWithEmailAndPassword(
          document.getElementById('regEmail').value,
          document.getElementById('regPassword').value
        );
        await cred.user.updateProfile({ displayName: document.getElementById('regName').value });
        await d.ref('users/' + cred.user.uid + '/profile').set({
          displayName: document.getElementById('regName').value,
          email: cred.user.email,
          createdAt: Date.now()
        });
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError('registerError', err.message);
      } finally { setLoading('registerBtn', false); }
    }

    async function handleGoogleLogin() {
      try {
        var a = window.auth || window.NEXUS_AUTH;
        var g = window.googleProvider || window.NEXUS_GOOGLE_PROVIDER;
        var d = window.db || window.NEXUS_DB;
        await a.signInWithPopup(g);
        const user = a.currentUser;
        if (user) {
          const snap = await d.ref('users/' + user.uid + '/profile').once('value');
          if (!snap.exists()) {
            await d.ref('users/' + user.uid + '/profile').set({
              displayName: user.displayName, email: user.email, createdAt: Date.now()
            });
          }
        }
        window.location.href = 'dashboard.html';
      } catch (err) { showError('loginError', err.message); }
    }

    async function handleGitHubLogin() {
      try {
        var a = window.auth || window.NEXUS_AUTH;
        var p = new a.GithubAuthProvider();
        var d = window.db || window.NEXUS_DB;
        const result = await a.signInWithPopup(p);
        const user = result.user;
        if (user) {
          const snap = await d.ref('users/' + user.uid + '/profile').once('value');
          if (!snap.exists()) {
            await d.ref('users/' + user.uid + '/profile').set({
              displayName: user.displayName, email: user.email, createdAt: Date.now()
            });
          }
        }
        window.location.href = 'dashboard.html';
      } catch (err) { showError('loginError', err.message); }
    }

    async function handleOTP(e) {
      e.preventDefault();
      setLoading('otpBtn', true);
      try {
        var a = window.auth || window.NEXUS_AUTH;
        await a.sendSignInLinkToEmail(document.getElementById('otpEmail').value, {
          url: window.location.origin + '/dashboard.html',
          handleCodeInApp: true
        });
        showError('otpError', 'Magic link sent! Check your email.');
      } catch (err) {
        showError('otpError', err.message);
      } finally { setLoading('otpBtn', false); }
    }

    if (window.NEXUS_INITIALIZED) {
      var a = window.auth || window.NEXUS_AUTH;
      if (a) {
        a.onAuthStateChanged(function(user) {
          if (user && window.location.pathname.includes('login')) {
            window.location.href = 'dashboard.html';
          }
        });
      }
    }

    const canvas = document.getElementById('particlesCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resizeCanvas() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resizeCanvas();

    const PARTICLE_COUNT = 60;
    const CONNECTION_DIST = 120;
    const particles = Array.from({length: PARTICLE_COUNT}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.8 + 0.3
    }));

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,240,255,0.3)';
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECTION_DIST) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `rgba(0,240,255,${(1 - dist / CONNECTION_DIST) * 0.08})`;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
    window.addEventListener('resize', resizeCanvas);

    (function waitForFirebase(attempts) {
      if (window.NEXUS_INITIALIZED) return;
      if (attempts > 10) {
        var fbLoaded = typeof firebase !== 'undefined';
        var hasConfig = window.NEXUS_CONFIG && window.NEXUS_CONFIG.apiKey && window.NEXUS_CONFIG.apiKey.length > 10;
        var setupMsg = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#050507;padding:2rem">' +
          '<div style="max-width:520px;text-align:center">' +
          '<div style="width:72px;height:72px;border-radius:20px;background:var(--gradient-brand);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;margin:0 auto 1.5rem;box-shadow:0 0 60px rgba(0,240,255,0.3)">N</div>' +
          '<h1 style="font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:0.5rem">NEXUS HOSTING</h1>' +
          '<p style="color:rgba(255,255,255,0.4);margin-bottom:2rem;font-size:0.95rem">' + (fbLoaded ? 'Firebase config issue' : 'Firebase SDK not loaded') + '</p>' +
          '<div style="background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.1);border-radius:16px;padding:2rem;text-align:left">' +
          '<h2 style="font-size:1rem;font-weight:700;margin-bottom:1rem;color:#00F0FF">Debug Info</h2>' +
          '<div style="margin-bottom:1rem">' +
          '<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.85rem;color:rgba(255,255,255,0.6)"><span>Firebase SDK:</span><span style="font-weight:600;color:' + (fbLoaded ? '#00e676' : '#ff4444') + '">' + (fbLoaded ? 'Loaded' : 'Missing') + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.85rem;color:rgba(255,255,255,0.6)"><span>Config File:</span><span style="font-weight:600;color:' + (hasConfig ? '#00e676' : '#ffab00') + '">' + (hasConfig ? 'Found' : 'Check file path') + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.85rem;color:rgba(255,255,255,0.6)"><span>API Key:</span><span style="font-weight:600;color:' + (hasConfig ? '#00e676' : '#ff4444') + ';font-family:monospace;font-size:0.75rem">' + (hasConfig ? window.NEXUS_CONFIG.apiKey.substring(0, 15) + '...' : 'Missing') + '</span></div>' +
          '</div>' +
          '<p style="color:rgba(255,255,255,0.4);font-size:0.85rem">Check browser console (F12 Console) for errors.</p></div></div></div>';
        document.getElementById('loginBody').innerHTML = setupMsg;
        return;
      }
      setTimeout(function() { waitForFirebase(attempts + 1); }, 500);
    })(0);
  </script>
</body>
</html>
