<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS CLOUD — Forgot Password</title>
  <meta name="description" content="Reset your NEXUS CLOUD password">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/nexus.css">
  <style>
    body { background: var(--void-black); font-family: 'Inter', sans-serif; display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden }
    .fp-bg { position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%, rgba(0,240,255,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 60%, rgba(123,97,255,0.03) 0%, transparent 50%); pointer-events:none }
    .fp-card { position:relative;z-index:1;width:100%;max-width:420px;padding:2.5rem;background:rgba(5,5,7,0.8);backdrop-filter:blur(40px) saturate(1.8);border:1px solid rgba(255,255,255,0.06);border-radius:24px;box-shadow:0 0 80px rgba(0,240,255,0.03);margin:1.5rem }
    .fp-card::before { content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.3),transparent) }
    .fp-logo { text-align:center;margin-bottom:1.5rem }
    .fp-logo .icon { width:48px;height:48px;margin:0 auto 0.75rem;background:var(--gradient-brand);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#fff;box-shadow:0 0 30px rgba(0,240,255,0.15) }
    .fp-logo h1 { font-size:1.3rem;font-weight:800;font-family:'Space Grotesk',sans-serif;background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent }
    .fp-logo p { color:rgba(255,255,255,0.3);font-size:0.78rem;margin-top:0.2rem }
    .form-group { margin-bottom:1rem }
    .form-group label { display:block;font-size:0.72rem;color:rgba(255,255,255,0.4);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem }
    .form-group input { width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:var(--signal-white);font-size:0.85rem;outline:none;box-sizing:border-box;transition:all 0.3s }
    .form-group input:focus { border-color:rgba(0,240,255,0.3);box-shadow:0 0 0 3px rgba(0,240,255,0.04) }
    .btn-fp { width:100%;padding:0.8rem;background:var(--gradient-brand);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.3s }
    .btn-fp:hover { transform:translateY(-1px);box-shadow:0 12px 30px rgba(0,240,255,0.15) }
    .fp-footer { text-align:center;margin-top:1.25rem }
    .fp-footer a { color:rgba(0,240,255,0.6);font-size:0.8rem;text-decoration:none }
    .fp-footer a:hover { color:var(--nexus-cyan) }
    .fp-success { text-align:center;padding:1rem 0;display:none }
    .fp-success svg { width:48px;height:48px;margin-bottom:0.75rem }
    .fp-success h2 { font-size:1rem;font-weight:700;color:#10B981;margin-bottom:0.25rem }
    .fp-success p { color:rgba(255,255,255,0.35);font-size:0.8rem }
  </style>
</head>
<body>
  <div class="fp-bg"></div>
  <div class="fp-card">
    <div class="fp-logo">
      <div class="icon">N</div>
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>
    <form onsubmit="handleForgotPassword(event)" id="fpForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="fpEmail" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn-fp" id="fpBtn">Send Reset Link</button>
      <div id="fpError" style="color:#ff4444;font-size:0.8rem;text-align:center;margin-top:0.75rem;display:none"></div>
    </form>
    <div class="fp-success" id="fpSuccess">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h2>Email Sent!</h2>
      <p>Check your inbox for the password reset link</p>
    </div>
    <div class="fp-footer">
      <a href="/login">← Back to Sign In</a>
    </div>
  </div>
  <script>
    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('fpEmail').value;
      const btn = document.getElementById('fpBtn');
      const errEl = document.getElementById('fpError');
      btn.disabled = true; btn.textContent = 'Sending...'; errEl.style.display = 'none';

      try {
        if (window.auth || window.NEXUS_AUTH) {
          const a = window.auth || window.NEXUS_AUTH;
          await a.sendPasswordResetEmail(email);
        } else {
          await new Promise(r => setTimeout(r, 1200));
        }
        document.getElementById('fpForm').style.display = 'none';
        document.getElementById('fpSuccess').style.display = 'block';
      } catch (err) {
        errEl.textContent = err.message || 'Failed to send reset email. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    }
  </script>
</body>
</html>
