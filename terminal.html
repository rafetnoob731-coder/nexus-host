<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS HOSTING — Live Terminal</title>
  <meta name="description" content="NEXUS HOSTING Live Terminal — Real-time command console with AI assistance">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="config/firebase-config.js"></script>
  <link rel="stylesheet" href="css/nexus.css">
  <style>
    .terminal-page { display: flex; height: 100vh; background: var(--void-black); }
    .terminal-main { flex: 1; display: flex; flex-direction: column; margin-left: var(--sidebar-width); background: #0a0a0f; position: relative; }
    .terminal-main::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(0,240,255,0.03) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    .terminal-header { position: relative; z-index: 1; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(0,240,255,0.08); backdrop-filter: blur(12px); }
    .terminal-tabs { display: flex; gap: 0.25rem; flex: 1; overflow-x: auto; }
    .terminal-tab { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.85rem; border-radius: 6px; font-size: 0.78rem; font-family: var(--font-mono); color: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.02); border: 1px solid transparent; white-space: nowrap; }
    .terminal-tab.active { color: var(--nexus-cyan); background: rgba(0,240,255,0.06); border-color: rgba(0,240,255,0.15); }
    .terminal-tab .close-tab { opacity: 0; width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; transition: all 0.2s; }
    .terminal-tab:hover .close-tab { opacity: 0.5; }
    .terminal-tab .close-tab:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .terminal-actions { display: flex; gap: 0.35rem; }
    .term-btn { padding: 0.35rem 0.6rem; border-radius: 6px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.35rem; }
    .term-btn:hover { background: rgba(255,255,255,0.06); color: var(--signal-white); }
    .term-btn.active { background: rgba(0,240,255,0.1); border-color: rgba(0,240,255,0.2); color: var(--nexus-cyan); }
    .term-body { flex: 1; display: flex; position: relative; z-index: 1; overflow: hidden; }
    .term-console { flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow: hidden; }
    .term-output { flex: 1; overflow-y: auto; padding: 0.5rem 0; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6; color: rgba(255,255,255,0.75); }
    .term-output .line { white-space: pre-wrap; word-break: break-all; padding: 0 0.5rem; animation: termFadeIn 0.05s ease; }
    .term-output .line.system { color: rgba(0,240,255,0.5); }
    .term-output .line.success { color: #10B981; }
    .term-output .line.error { color: #ff4444; }
    .term-output .line.warning { color: #ffab00; }
    .term-output .line.input { color: var(--signal-white); }
    .term-output .line.info { color: rgba(123,97,255,0.7); }
    .term-output .line.output { color: rgba(255,255,255,0.5); }
    .term-input-line { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; margin-top: 0.25rem; border-top: 1px solid rgba(0,240,255,0.06); }
    .term-prompt { font-family: var(--font-mono); font-size: 0.85rem; color: var(--nexus-cyan); white-space: nowrap; }
    .term-input-wrap { flex: 1; position: relative; }
    .term-input-wrap input { width: 100%; background: transparent; border: none; outline: none; color: var(--signal-white); font-family: var(--font-mono); font-size: 0.85rem; caret-color: var(--nexus-cyan); }
    .term-input-wrap input::placeholder { color: rgba(255,255,255,0.1); }
    .term-cursor { display: inline-block; width: 8px; height: 1.1em; background: rgba(0,240,255,0.8); margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes termFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .term-split { width: 50%; border-left: 1px solid rgba(0,240,255,0.08); display: flex; flex-direction: column; }
    .term-split .term-output { font-size: 0.78rem; }
    .term-ai-panel { width: 280px; border-left: 1px solid rgba(123,97,255,0.1); display: flex; flex-direction: column; background: rgba(123,97,255,0.02); }
    .term-ai-header { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(123,97,255,0.08); font-size: 0.75rem; font-weight: 700; color: var(--plasma-purple); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.4rem; }
    .term-ai-header .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--plasma-purple); animation: aiPulse 2s ease infinite; }
    @keyframes aiPulse { 0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--plasma-purple); } 50% { opacity: 0.4; box-shadow: none; } }
    .term-ai-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .term-ai-item { padding: 0.6rem 0.75rem; margin-bottom: 0.25rem; border-radius: 8px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .term-ai-item:hover { background: rgba(123,97,255,0.06); border-color: rgba(123,97,255,0.1); }
    .term-ai-item .cmd { font-family: var(--font-mono); color: rgba(255,255,255,0.7); }
    .term-ai-item .desc { color: rgba(255,255,255,0.3); font-size: 0.7rem; margin-top: 0.15rem; }
    .term-ai-footer { padding: 0.5rem 1rem; border-top: 1px solid rgba(123,97,255,0.06); font-size: 0.7rem; color: rgba(255,255,255,0.2); text-align: center; }
    .term-status { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 1rem; background: rgba(0,0,0,0.4); border-top: 1px solid rgba(0,240,255,0.05); font-size: 0.7rem; color: rgba(255,255,255,0.25); font-family: var(--font-mono); position: relative; z-index: 1; }
    .term-status .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; }
    @media (max-width: 768px) { .term-ai-panel, .term-split { display: none; } .terminal-main { margin-left: 0; } }
  </style>
</head>
<body>
  <div class="terminal-page">
    <aside class="sidebar" id="termSidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">N</div>
        <div class="sidebar-brand">NEXUS <span>HOSTING</span></div>
        <div style="font-size:0.55rem;color:var(--titanium);letter-spacing:0.15em;text-transform:uppercase;margin-left:auto;position:absolute;bottom:0.85rem;right:1rem;background:rgba(0,240,255,0.08);padding:0.15rem 0.4rem;border-radius:4px;border:1px solid rgba(0,240,255,0.12)">TERMINAL</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <div class="nav-item" onclick="window.location.href='/dashboard'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </div>
          <div class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            Terminal
          </div>
          <div class="nav-item" onclick="window.location.href='/files'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Files
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Management</div>
          <div class="nav-item" onclick="window.location.href='/dashboard#section-projects'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Projects
          </div>
          <div class="nav-item" onclick="window.location.href='/deploy/zip'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg>
            Deploy
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card" onclick="toggleTermUserMenu()">
          <div class="user-avatar" id="termUserAvatar">N</div>
          <div class="user-info">
            <div class="user-name" id="termUserName">Loading...</div>
            <div class="user-email" id="termUserEmail">loading@nexus.host</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="terminal-main">
      <div class="terminal-header">
        <div class="terminal-tabs" id="terminalTabs"></div>
        <div class="terminal-actions">
          <button class="term-btn" onclick="toggleSplit()" id="splitBtn" title="Split terminal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="18"/></svg>
            Split
          </button>
          <button class="term-btn" onclick="newTab()" title="New tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="term-btn" onclick="clearTerminal()" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <div class="term-body" id="termBody">
        <div class="term-console" id="termConsole">
          <div class="term-output" id="termOutput"></div>
          <div class="term-input-line">
            <span class="term-prompt" id="termPrompt">root@nexus:~$</span>
            <div class="term-input-wrap">
              <input type="text" id="termInput" placeholder="Type a command..." autofocus spellcheck="false" autocomplete="off">
            </div>
          </div>
        </div>

        <div class="term-ai-panel" id="termAiPanel">
          <div class="term-ai-header">
            <span class="pulse-dot"></span>
            AI Assistant
          </div>
          <div class="term-ai-list" id="termAiList"></div>
          <div class="term-ai-footer">AI suggests commands based on context</div>
        </div>
      </div>

      <div class="term-status">
        <span class="status-dot"></span>
        <span>Connected</span>
        <span style="margin:0 0.5rem;opacity:0.3">|</span>
        <span id="termSessionInfo">Session: bash</span>
        <span style="margin:0 0.5rem;opacity:0.3">|</span>
        <span id="termUptime">Uptime: 0s</span>
      </div>
    </div>
  </div>

  <script src="js/terminal.js"></script>
</body>
</html>
